services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - calman
    restart: unless-stopped

  calman:
    build: .
    expose:
      - "3000"
    environment:
      - ICS_URL=${ICS_URL}
      - WORK_START=${WORK_START:-10:00}
      - WORK_END=${WORK_END:-16:00}
      - WORK_DAYS=${WORK_DAYS:-1,2,3,4,5}
      - BUFFER_MINUTES=${BUFFER_MINUTES:-10}
      - PORT=${PORT:-3000}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
