services:
  calman:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ICS_URL=${ICS_URL}
      - WORK_START=${WORK_START:-10:00}
      - WORK_END=${WORK_END:-16:00}
      - WORK_DAYS=${WORK_DAYS:-1,2,3,4,5}
      - BUFFER_MINUTES=${BUFFER_MINUTES:-10}
      - DISPLAY_NAME=${DISPLAY_NAME:-}
      - PORT=${PORT:-3000}
    restart: unless-stopped
